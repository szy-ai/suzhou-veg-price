function calcDist(lat1, lng1, lat2, lng2) {
  var dlat = (lat1 - lat2) * 111.32;
  var dlng = (lng1 - lng2) * 111.32 * 0.832;
  return Math.sqrt(dlat*dlat + dlng*dlng);
}

    for (var j = 0; j < matrixSups.length; j++) { if (matrixSups[j].id === bestSid) { bestSupName = matrixSups[j].name; break; } }

    html += '<tr class="veg-row" onclick="showVegDetail('+rd.vid+')">' +
      '<td style="position:sticky;left:0;z-index:1;background:white;font-weight:bold;text-align:left">'+rd.name+'</td>';
    for (var j = 0; j < matrixSups.length; j++) {
      var p = prices[matrixSups[j].id];
      html += '<td'+(matrixSups[j].id===bestSid?' class="best-cell"':'')+'>'+(p!=null?'ВҘ'+p.toFixed(2):'--')+'</td>';
    }
    html += '<td style="background:#FFF8E1;font-weight:bold;color:var(--green)">ВҘ'+bestPrice.toFixed(2)+'<br><span style="font-size:11px;color:var(--gray)">'+bestSupName+'</span></td></tr>';
  }
  html += '</tbody></table></div></div>' +
    '<div style="text-align:center;font-size:12px;color:var(--gray);padding:4px">з»ҝиүІж Үи®° = иҜҘи¶…еёӮжҳҜжңҖдҪҺд»· В· зӮ№еҮ»иЎҢжҹҘзңӢиҜҰжғ…</div>';
  c.innerHTML = html;
}

// ===== и¶…еёӮеҲ—иЎЁ =====
function renderMarkets() {
  var c = document.getElementById('panel-markets');
  var html = '<div class="card"><div class="card-title">рҹҸӘ йҖүжӢ©и¶…еёӮжҹҘзңӢд»·ж ј</div>';
  for (var i = 0; i < sups.length; i++) {
    var s = sups[i];
    var bestCount = 0;
    for (var j = 0; j < vegs.length; j++) { if (vegs[j].best_sid === s.id) { bestCount++; } }
    html += '<div class="sup-card" style="background:white;border:1px solid #e0e0e0;border-radius:10px;padding:14px;margin:8px 0" onclick="showSupDetail('+s.id+')">' +
      '<div style="display:flex;align-items:center;justify-content:space-between">' +
      '<div><div class="sup-name" style="font-size:18px">'+s.name+'</div>' +
      '<div class="sup-addr" style="font-size:13px;margin-top:4px">'+(s.address||s.area)+'</div></div>' +
      '<div style="text-align:right"><div class="sup-badge" style="display:inline-block">'+bestCount+'з§ҚжңҖдҪҺд»·</div></div></div></div>';
  }
  html += '</div>';
  c.innerHTML = html;
}

// ===== йў„иӯҰ =====
function renderWarnings() {
  var c = document.getElementById('panel-warn');
  if (warns.length === 0) {
    c.innerHTML = '<div class="card" style="text-align:center;padding:30px">' +
      '<div style="font-size:48px;margin-bottom:10px">вң…</div>' +
      '<div style="font-size:20px;font-weight:bold;color:var(--green)">еҪ“еүҚжүҖжңүд»·ж јжӯЈеёё</div>' +
      '<div style="font-size:15px;color:var(--gray);margin-top:6px">жІЎжңүй«ҳдәҺеқҮд»·20%зҡ„ејӮеёёжҠҘд»·</div></div>';
    return;
  }
  var html = '<div class="card"><div class="card-title" style="color:var(--red)">вҡ пёҸ еҸ‘зҺ° '+warns.length+' жқЎејӮеёёй«ҳд»·</div>' +
    '<div style="font-size:13px;color:var(--gray);margin-bottom:8px">й«ҳдәҺиҜҘиҸңеҗ„и¶…еёӮеқҮд»· 20% еҚійў„иӯҰ</div>';
  for (var i = 0; i < warns.length; i++) {
    var w = warns[i];
    html += '<div class="warn-row card" onclick="showVegDetail('+w.vid+')" style="cursor:pointer;margin-bottom:8px">' +
      '<div style="display:flex;align-items:center;justify-content:space-between">' +
      '<div><div style="font-size:17px;font-weight:bold">'+w.name+'</div>' +
      '<div style="font-size:14px;color:var(--gray)">@ '+w.sup+'</div></div>' +
      '<div style="text-align:right"><div class="warn-pct">вҶ‘ '+w.over_pct+'%</div>' +
      '<div style="font-size:14px;color:var(--red)">ВҘ'+w.price.toFixed(2)+
      '<span style="font-size:12px;color:var(--gray)"> / еқҮд»·ВҘ'+w.avg.toFixed(2)+'</span></div></div></div></div>';
  }
  html += '</div>';
  c.innerHTML = html;
}

// ===== и¶…еёӮиҜҰжғ… =====
function showSupDetail(sid) {
  document.getElementById('mainHeader').style.display = 'none';
  var panels = document.querySelectorAll('.tab-panel');
  for (var i = 0; i < panels.length; i++) { panels[i].className = 'tab-panel'; }
  var panel = document.getElementById('panel-sup-detail');
  panel.className = 'tab-panel active';
  var data = supDetails['' + sid];
  if (!data) { panel.innerHTML = '<div class="error-state" style="padding:30px;text-align:center;color:var(--red)">вқҢ ж•°жҚ®дёҚеӯҳеңЁ</div>'; return; }
  var sup = data.supermarket || {};
  var items = data.items || [];
  var html = '<div class="top-bar"><span class="back-btn" onclick="showTab(\'markets\')">вҖ№ иҝ”еӣһ</span>' +
    '<span class="title">'+sup.name+'</span></div>' +
    '<div class="sup-detail-header"><div class="name">'+sup.name+'</div>' +
    '<div class="addr">'+(sup.address||sup.area||'')+'</div></div>';
  if (items.length === 0) {
    html += '<div style="padding:30px;text-align:center;color:var(--gray)">жҡӮж— жҠҘд»·</div>';
  } else {
    for (var i = 0; i < items.length; i++) {
      var it = items[i];
      var cls = it.is_best ? 'detail-row best' : 'detail-row';
      var priceColor = it.is_best ? 'var(--green)' : '#333';
      html += '<div class="'+cls+'" onclick="showVegDetail('+it.vid+')">' +
        '<div style="flex:1"><span style="font-size:16px;font-weight:bold">'+it.name+'</span>' +
        '<div style="font-size:12px;color:var(--gray)">еқҮд»· ВҘ'+it.avg_price.toFixed(2)+'/ж–Ө</div></div>' +
        '<div style="text-align:right"><div style="font-size:18px;font-weight:bold;color:'+priceColor+'">ВҘ'+(it.price||0).toFixed(2)+'</div>' +
        (it.is_best ? '<div style="font-size:12px;color:var(--green);font-weight:bold">вҳ… е…ЁеҹҺжңҖдҪҺ</div>' : '')+'</div></div>';
    }
  }
  panel.innerHTML = html;
}

// ===== и”¬иҸңиҜҰжғ… =====
function showVegDetail(vid) {
  document.getElementById('mainHeader').style.display = 'none';
  var panels = document.querySelectorAll('.tab-panel');
  for (var i = 0; i < panels.length; i++) { panels[i].className = 'tab-panel'; }
  var panel = document.getElementById('panel-veg-detail');
  panel.className = 'tab-panel active';

  var prices = vegDetails['' + vid] || [];
  var name = '';
  for (var i = 0; i < vegs.length; i++) { if (vegs[i].vid === vid) { name = vegs[i].name; break; } }
  if (prices.length === 0) { panel.innerHTML = '<div style="padding:30px;text-align:center;color:var(--red)">вқҢ ж— ж•°жҚ®</div>'; return; }

  var maxPrice = 0.01;
  var sum = 0;
  for (var i = 0; i < prices.length; i++) { if (prices[i].price > maxPrice) maxPrice = prices[i].price; sum += prices[i].price; }
  var avg = sum / prices.length;

  var html = '<div class="top-bar"><span class="back-btn" onclick="goBack()">вҖ№ иҝ”еӣһ</span>' +
    '<span class="title">'+name+'</span></div>' +
    '<div class="card" style="text-align:center;background:var(--green);color:white">' +
    '<div style="font-size:36px;font-weight:bold">ВҘ'+prices[0].price.toFixed(2)+'</div>' +
    '<div style="font-size:14px">е…ЁеҹҺжңҖдҪҺд»· В· еқҮд»· ВҘ'+avg.toFixed(2)+'</div></div>';

  if (prices.length >= 2) {
    var cheap = prices[0], expen = prices[prices.length-1];
    var diff = expen.price - cheap.price;
    if (diff > 0.01) {
      html += '<div class="card" style="background:#FFF8E1;border:2px solid #FFE082">' +
        '<div style="font-size:16px;font-weight:bold;color:#E65100">зңҒй’ұе°ҸиҙҙеЈ«</div>' +
        '<div style="font-size:14px;margin-top:4px">д№°'+name+'еҺ»гҖҢ'+cheap.sup+'гҖҚжҜ”гҖҢ'+expen.sup+'гҖҚдҫҝе®ң <b>ВҘ'+diff.toFixed(2)+'/ж–Ө</b></div></div>';
    }
  }

  for (var i = 0; i < prices.length; i++) {
    var p = prices[i];
    var ratio = p.price / maxPrice;
    var isBest = (i === 0);
    var color = isBest ? 'var(--green)' : (i === prices.length-1 ? 'var(--orange)' : '#66BB6A');
    html += '<div class="vdetail-price-row">' +
      '<div style="width:70px;flex-shrink:0;font-weight:'+(isBest?'bold':'normal')+';color:'+(isBest?'var(--green)':'#333')+'">'+p.sup+'</div>' +
      '<div class="vdetail-bar-bg"><div class="vdetail-bar-fill" style="width:'+Math.max(ratio*100,4)+'%;background:'+color+'"></div>' +
      '<div class="vdetail-bar-label">'+(ratio>=0.15?'ВҘ'+p.price.toFixed(2):'')+'</div></div>' +
      '<div class="vdetail-price" style="color:'+(isBest?'var(--green)':'#333')+'">'+(ratio<0.15?'ВҘ'+p.price.toFixed(2):'')+'</div></div>';
    if (isBest) { html += '<div style="text-align:center;margin:-4px 0 6px;font-size:13px;font-weight:bold;color:var(--green)">вҳ… жңҖдҪҺд»·</div>'; }
  }
  panel.innerHTML = html;
}

function goBack() { showTab('compare'); }

// ===== еҗҜеҠЁ =====
renderHome();
</script>
